name: Ticketing System CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted  # <--- 방금 만든 'master' 비서를 호출합니다!
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      run: |
        docker build -t kingking4105/ticketing-was:latest .
        docker push kingking4105/ticketing-was:latest

    - name: Deploy to K8s
      run: |
        # 깃허브 Secrets에 저장한 KUBE_CONFIG를 사용해 배포합니다.
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
        kubectl rollout restart deployment ticketing-was-deployment
