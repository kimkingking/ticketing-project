apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deploy  # 보혜님 기존 이름에 맞췄어요 ㅋ
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mariadb
        image: mariadb:10.6
        ports:
        - containerPort: 3306
        env:
        - name: MARIADB_ROOT_PASSWORD
          value: "1234"  # 보혜님이 쓰시던 비번!
        - name: MARIADB_DATABASE
          value: "ticket"
        # 핵심: 한글 깨짐 방지 설정! ㅋ
        args:
          - "--character-set-server=utf8mb4"
          - "--collation-server=utf8mb4_unicode_ci"
          - "--skip-character-set-client-handshake"
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
spec:
  selector:
    app: mysql
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
  type: ClusterIP
