apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
data:
  my.cnf: |
    [client]
    default-character-set = utf8mb4

    [mysql]
    default-character-set = utf8mb4

    [mysqld]
    character-set-client-handshake = FALSE
    character-set-server = utf8mb4
    collation-server = utf8mb4_unicode_ci
    
    # MySQL 8.0 감사 로그 설정
    general_log = 1
    general_log_file = /var/lib/mysql/server_audit.log
    log_output = FILE
    log_raw = 1
