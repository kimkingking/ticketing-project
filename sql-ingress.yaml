apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: internal-http-ingress  
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx

    # [1. WAF 보안 설정]
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecAuditLog /dev/stdout
      SecAuditLogType Serial

      # 💡 [핵심 추가] URL이나 파라미터에 스크립트(<script>)나 SQL 공격(1=1) 패턴이 보이면
      # OWASP 벌점 확인 전에 가장 먼저(phase:1) 403 에러로 즉시 차단하는 강력한 커스텀 룰!
      SecRule REQUEST_URI|ARGS "@rx (?i)(<script|1=1|or.*=.*|union.*select)" \
        "id:100001,phase:1,deny,status:403,log,msg:'Strict WAF Block: XSS or SQLi Detected'"

    # [2. DDoS 방어 설정 (현재 테스트를 위해 주석 처리 추천)]
    # nginx.ingress.kubernetes.io/limit-rps: "5"           
    # nginx.ingress.kubernetes.io/limit-connections: "3"    

    # [3. 기존 설정들]
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/enable-cors: "true"

spec:
  ingressClassName: nginx
  rules:
  - http: 
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service: { name: ticket-backend-svc, port: { number: 8000 } }
      - path: /
        pathType: Prefix
        backend:
          service: { name: ticket-frontend-svc, port: { number: 80 } }
