apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: internal-http-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    
    # [1] WAF 및 OWASP 핵심 규칙 활성화
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
    
    # [2] 에러 없는 안전한 커스텀 차단 규칙
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecRequestBodyAccess On
      SecAuditLog /dev/stdout
      SecAuditLogType Serial

      # 💡 [핵심 1] 로그인/회원가입 경로는 WAF 검사 면제 (비밀번호 특수문자 차단 방지)
      SecRule REQUEST_URI "@beginsWith /api/member/" "id:1000,phase:1,allow,ctl:ruleEngine=Off,log,msg:'Bypass WAF for Auth'"

      # 💡 [핵심 2] HTML 렌더링 전(Phase 1)에 공격 즉시 차단 (t: 옵션 제거로 Nginx 에러 방지)
      # 패턴: <script, 1=1, ' or, union select
      SecRule ARGS|QUERY_STRING|REQUEST_URI "@rx (?i)(<script|1=1|' or |\" or |union.*select)" "id:1001,phase:1,deny,status:403,log,msg:'Direct WAF Block (Phase 1)'"

    # [3] 기타 설정
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service: { name: ticket-backend-svc, port: { number: 8000 } }
      - path: /
        pathType: Prefix
        backend:
          service: { name: ticket-frontend-svc, port: { number: 80 } }
