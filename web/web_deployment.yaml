apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketing-web-deploy
  namespace: default # Ingress 및 WAS와 같은 동네로 통일!
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ticketing-web
  template:
    metadata:
      labels:
        app: ticketing-web
    spec:
      containers:
      - name: nginx
        image: nginx:1.29.5
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: ticketing-web-html
---
apiVersion: v1
kind: Service
metadata:
  name: ticketing-web-svc # 앞서 Ingress 설정에서 목적지로 적었던 바로 그 이름!
  namespace: default
spec:
  type: ClusterIP # 외부 접속은 Ingress(10.4.0.201)가 담당하므로 내부는 ClusterIP로 충분합니다.
  selector:
    app: ticketing-web
  ports:
  - port: 80
    targetPort: 80
