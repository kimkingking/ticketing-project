apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketing-web
  namespace: ticketing-system # 우리 네임스페이스로 통일
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ticketing-web
  template:
    metadata:
      labels:
        app: ticketing-web
    spec:
      containers:
      - name: nginx
        image: nginx:1.29.5
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
      volumes:
      - name: html-volume
        configMap:
          name: ticketing-web-html # 우리가 만든 바구니 이름
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: ticketing-system
spec:
  type: LoadBalancer # MetalLB를 쓰기로 했으므로 NodePort보다 이게 유리합니다.
  selector:
    app: ticketing-web
  ports:
  - port: 80
    targetPort: 80

