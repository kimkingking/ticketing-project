apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticketing-web-deploy
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ticketing-web
  template:
    metadata:
      labels:
        app: ticketing-web
    spec:
      containers:
      - name: nginx-web
        image: nginx:latest
        ports:
        - containerPort: 80
        volumeMounts:
        - name: web-content
          mountPath: /usr/share/nginx/html
      volumes:
      - name: web-content
        hostPath:
          path: /root/web/ProjectWebPage  # 실제 파일이 있는 그곳!
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: ticketing-web-svc
  namespace: default
spec:
  selector:
    app: ticketing-web
  ports:
  - port: 80
    targetPort: 80
