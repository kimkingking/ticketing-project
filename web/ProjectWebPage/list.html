<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공연 정보 및 예매 상황판</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="container">
    <h2>🎭 공연 목록 & 예매 상황판 (KOPIS)</h2>
    
    <div class="header-controls">
        <select id="genreSelect" title="장르 선택">
            <option value="">🎭 장르 전체</option>
            <option value="AAAA">연극</option>
            <option value="GGGA">뮤지컬</option>
            <option value="CCCA">서양음악(클래식)</option>
            <option value="CCCC">한국음악(국악)</option>
            <option value="CCCD">대중음악</option>
            <option value="BBBC">무용(서양/한국무용)</option>
            <option value="BBBE">대중무용</option>
            <option value="EEEA">복합</option>
            <option value="EEEB">서커스/마술</option>
        </select>

        <input type="date" id="startDate" title="시작일">
        <input type="date" id="endDate" title="종료일">
        <button onclick="fetchPerformanceList()">공연 목록 불러오기</button>
        <button onclick="fetchBoxOffice()">예매 상황판 보기</button>
    </div>

    <div class="grid-container">
        <div>
            <h3 class="section-title performance-title">📋 공연 목록 (최대 10건)</h3>
            <div id="performanceList">데이터를 불러오는 중입니다...</div>
        </div>

        <div>
            <h3 class="section-title boxoffice-title">🔥 예매 상황판 (박스오피스)</h3>
            <div id="boxOfficeList">데이터를 불러오는 중입니다...</div>
        </div>
    </div>
</div>

<script src="./js/app.js"></script>

</body>
</html>
