<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공연 상세 정보</title>
    <link rel="stylesheet" href="./css/detail.css">
</head>

<div id="waitingModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <h2 style="font-size: 24px; font-weight: 900; margin-bottom: 20px;">예매 대기중입니다.</h2>
        <div class="waiting-box">
            <p>사용자 앞에 <strong id="waitingCount">129</strong> 명의 대기자가 있습니다.</p>
            <p style="font-size: 13px; color: #555; font-weight: bold; margin-top: 10px;">
                현재 접속중인 사용자가 많아 대기중이며<br>잠시만 기다리시면, 예매 페이지로 이동합니다.
            </p>
            <div class="progress-bar-container">
                <div id="progressBar" class="progress-bar"></div>
            </div>
        </div>
    </div>
</div>

<div id="captchaModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <h2 style="color: #4834d4; font-weight: 900; margin-bottom: 20px;">문자를 입력해주세요.</h2>
        <div class="captcha-box">
            <div class="captcha-display">
                <span id="captchaText">L T L R D W</span>
                <button class="refresh-btn" onclick="generateCaptcha()">🔄</button>
            </div>
            <div class="captcha-input-group">
                <input type="text" id="captchaInput" placeholder="문자를 입력해주세요.">
                <button class="submit-btn" onclick="verifyCaptcha()">입력완료</button>
            </div>
        </div>
        <button class="close-btn" onclick="closeModals()">닫기</button>
    </div>
</div>

<body>

<div class="detail-container" id="detailContainer">
    <div class="loading">상세 정보를 불러오는 중입니다...</div>
</div>

<script src="./js/detail.js"></script>
</body>
</html>
