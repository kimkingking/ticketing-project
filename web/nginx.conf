server {
    listen 80;
    server_name localhost;

    # 1. 일반 웹페이지 접속 처리 (프론트엔드)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. 💡 실무 핵심: /api 로 시작하는 요청은 쿠버네티스 내부 WAS(ClusterIP)로 토스!
    location /api/ {
        # K8s 서비스 이름(ticket-backend-svc)과 포트(8000)를 그대로 적습니다.
        proxy_pass http://ticket-backend-svc:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}