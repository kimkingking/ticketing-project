<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULSE 티켓 | 좌석 선택</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="./css/mainpage.css">
    <link rel="stylesheet" href="./css/booking.css">
</head>
<body class="antialiased bg-gray-50 min-h-screen pb-20">
    
    <header class="w-full bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between gap-6">
            <div class="flex items-center gap-2 cursor-pointer" onclick="safeNavigate('index.html')">
                <span class="text-3xl text-purple-600"><i data-lucide="ticket" fill="#c084fc" class="w-8 h-8"></i></span>
                <span class="font-black text-2xl tracking-tight text-gray-900">PULSE <span class="text-purple-500 font-normal">티켓</span></span>
            </div>
            <div id="auth-menu" class="flex items-center gap-5"></div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 flex flex-col lg:flex-row gap-8 animate-fade-in">
        
        <div class="flex-1 bg-white rounded-[2rem] shadow-sm border border-gray-100 p-8 md:p-12">
            <div class="text-center mb-10">
                <h2 class="text-2xl font-black text-gray-900 mb-2">좌석 선택</h2>
                <p class="text-sm text-gray-500">원하시는 좌석을 선택해주세요. (최대 1개)</p>
            </div>

            <div class="max-w-md mx-auto mb-16 relative">
                <div class="stage-curve flex items-end justify-center pb-2">
                    <span class="text-purple-400 font-bold tracking-[0.5em] text-sm">STAGE</span>
                </div>
            </div>

            <div class="max-w-sm mx-auto grid grid-cols-4 gap-4 md:gap-6 justify-items-center" id="seatContainer">
                <div class="col-span-4 text-center text-gray-400 py-10">좌석 정보를 불러오는 중입니다...</div>
            </div>
            
            <div class="mt-16 flex justify-center gap-6 text-sm font-medium text-gray-600 border-t pt-8">
                <div class="flex items-center gap-2"><div class="w-5 h-5 rounded bg-[#f3f4f6] border border-[#d1d5db]"></div> 예매가능</div>
                <div class="flex items-center gap-2"><div class="w-5 h-5 rounded bg-[#9333ea] border border-[#7e22ce]"></div> 선택됨</div>
                <div class="flex items-center gap-2"><div class="w-5 h-5 rounded bg-[#cbd5e1] border border-[#9ca3af]"></div> 예매완료</div>
            </div>
        </div>

        <div class="w-full lg:w-80 flex-shrink-0">
            <div class="bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden sticky top-28">
                <img id="infoPoster" src="" class="w-full h-48 object-cover bg-gray-100" alt="포스터" onerror="this.src='https://via.placeholder.com/300x200?text=PULSE+TICKET'">
                <div class="p-6">
                    <h3 id="infoTitle" class="text-xl font-black text-gray-900 mb-4 line-clamp-2">공연명</h3>
                    <div class="space-y-3 text-sm text-gray-600 mb-6">
                        <div class="flex"><span class="w-16 font-bold text-gray-400">일시</span><span id="infoDateTime" class="font-medium">-</span></div>
                        <div class="flex"><span class="w-16 font-bold text-gray-400">장소</span><span id="infoPlace" class="font-medium">-</span></div>
                        <div class="flex"><span class="w-16 font-bold text-gray-400">선택좌석</span><span id="infoSeat" class="font-bold text-purple-600">-</span></div>
                    </div>
                    <div class="border-t border-gray-100 pt-4 mb-6 flex justify-between items-end">
                        <span class="font-bold text-gray-400">총 결제금액</span>
                        <span class="text-2xl font-black text-purple-600" id="infoPrice">0원</span>
                    </div>
                    <button id="btnReserve" onclick="processReservation()" class="w-full bg-gray-300 text-gray-500 font-bold text-lg py-4 rounded-xl transition-all cursor-not-allowed" disabled>
                        좌석을 선택하세요
                    </button>
                </div>
            </div>
        </div>
    </main>


    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

<div id="captchaModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-slate-900/70 backdrop-blur-sm"></div>
    <div class="relative bg-white rounded-3xl w-full max-w-md p-8 text-center shadow-2xl">
        <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <i data-lucide="bot" class="w-8 h-8 text-purple-600"></i>
        </div>
        <h2 class="text-2xl font-black text-gray-900 mb-2">본인 인증</h2>
        <p class="text-gray-500 text-sm mb-6">부정 예매를 막기 위해 사람임을 인증해주세요.</p>
        <div class="captcha-container flex justify-center mb-6">
            <div class="cf-turnstile" 
                 data-sitekey="3x00000000000000000000FF" 
                 data-callback="javascriptCallback"></div>
        </div>
        <p class="text-xs text-gray-400">인증이 완료되면 좌석 선택이 가능해집니다.</p>
    </div>
</div>

    <script src="./js/booking.js"></script>
</body>
</html>
