<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULSE 티켓 | 공연 상세 정보</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="./css/detail.css">
    
    <style>
        .animate-fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="antialiased">

    <header class="w-full bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between gap-6">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.href='index.html'">
                <span class="text-3xl text-purple-600"><i data-lucide="ticket" fill="#c084fc" class="w-8 h-8"></i></span>
                <span class="font-black text-2xl tracking-tight text-gray-900">PULSE <span class="text-purple-500 font-normal">티켓</span></span>
            </div>

            <div class="hidden md:flex flex-1 max-w-xl relative">
                <input type="text" placeholder="검색어를 입력하세요 (예: 레베카)" class="w-full bg-gray-100 border-none rounded-full py-3 pl-12 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-purple-300 transition-all">
                <i data-lucide="search" class="absolute left-4 top-3 text-gray-400 w-5 h-5"></i>
            </div>

            <div id="auth-menu" class="flex items-center gap-5"></div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-10" id="detailContainer">
        <div class="flex flex-col items-center justify-center py-32">
            <div class="pastel-loader mb-4"></div>
            <div class="text-purple-600 font-bold text-lg">상세 정보를 불러오는 중입니다...</div>
            <p class="text-gray-400 text-sm mt-2">잠시만 기다려주세요.</p>
        </div>
    </main>

    <div id="waitingModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/70 backdrop-blur-sm"></div>
        <div class="relative bg-white rounded-3xl w-full max-w-md p-8 text-center shadow-2xl">
            <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="hourglass" class="w-8 h-8 text-purple-600 animate-pulse"></i>
            </div>
            <h2 class="text-2xl font-black text-gray-900 mb-2">예매 대기중입니다</h2>
            <p class="text-gray-500 text-sm mb-6 leading-relaxed">
                현재 접속자가 많아 대기중입니다.<br>잠시만 기다리시면 예매 페이지로 이동합니다.
            </p>
            <div class="bg-gray-50 rounded-2xl p-6 border border-gray-100 mb-2">
                <p class="text-gray-600 font-medium mb-1">내 앞에 대기자</p>
                <div class="text-4xl font-black text-purple-600 tracking-tight mb-4">
                    <span id="waitingCount">0</span><span class="text-xl text-gray-500 font-bold ml-1">명</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
                    <div id="progressBar" class="bg-gradient-to-r from-purple-500 to-pink-500 h-2.5 rounded-full" style="width: 0%"></div>
                </div>
            </div>
            <p class="text-xs text-red-400 mt-4 font-bold">* 새로고침 시 대기 순서가 뒤로 밀릴 수 있습니다.</p>
        </div>
    </div>
    <script src="./js/detail.js"></script>
</body>
</html>
