<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULSE 티켓 | 장르별 공연 리스트</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="antialiased">

    <div id="loader" class="fixed inset-0 z-[200] bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center transition-opacity duration-500 hidden">
        <div class="pastel-loader mb-4"></div>
        <h1 id="loaderText" class="text-purple-600 font-bold text-lg tracking-widest">데이터를 불러오는 중...</h1>
        <p class="text-gray-400 text-sm mt-2">상세 가격 정보를 함께 가져오고 있습니다.</p>
    </div>

    <header class="w-full bg-white/80 backdrop-blur-md border-b border-gray-100 sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-2 cursor-pointer" onclick="location.href='index.html'">
            <i data-lucide="ticket" class="w-8 h-8 text-purple-600" fill="currentColor"></i>
            <span class="font-black text-2xl tracking-tighter text-gray-900">PULSE <span class="text-purple-500 font-light">TICKET</span></span>
        </div>
        
        <div id="header-filters" class="flex items-center gap-2 bg-gray-100 p-1.5 rounded-2xl">
            <div class="flex items-center gap-2 px-3 bg-white rounded-xl shadow-sm border border-gray-100">
                <i data-lucide="calendar" class="w-4 h-4 text-gray-400"></i>
                <input type="date" id="startDate" class="bg-transparent text-xs font-semibold py-2 outline-none">
                <span class="text-gray-300">~</span>
                <input type="date" id="endDate" class="bg-transparent text-xs font-semibold py-2 outline-none">
            </div>
            <button onclick="fetchAllData()" class="bg-purple-600 hover:bg-purple-700 text-white p-2.5 rounded-xl transition-all shadow-md active:scale-95">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
            </button>
        </div>
    </div>
</header>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <section class="mb-14">
            <h2 class="text-xl font-bold text-gray-900 mb-6 flex items-center gap-2">
                <i data-lucide="layout-grid" class="w-5 h-5 text-purple-500"></i> 어떤 공연을 찾으시나요?
            </h2>
            <div id="genreCardsContainer" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-4">
                </div>
        </section>

        <section class="mb-16 bg-gradient-to-r from-purple-50 to-pink-50 rounded-3xl p-8 border border-purple-100/50 relative">
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-black text-gray-900 flex items-center gap-2">
            🔥 <span id="boxOfficeTitleGenre" class="text-purple-600">전체</span> 예매 상황판 TOP
        </h2>
        <div class="flex gap-2">
            <button onclick="scrollBoxOffice('left')" class="p-2 rounded-full bg-white border border-purple-100 shadow-sm hover:bg-purple-600 hover:text-white transition-all">
                <i data-lucide="chevron-left" class="w-5 h-5"></i>
            </button>
            <button onclick="scrollBoxOffice('right')" class="p-2 rounded-full bg-white border border-purple-100 shadow-sm hover:bg-purple-600 hover:text-white transition-all">
                <i data-lucide="chevron-right" class="w-5 h-5"></i>
            </button>
        </div>
    </div>
    <div id="boxOfficeList" class="flex gap-6 overflow-x-auto no-scrollbar pb-4 snap-x snap-mandatory scroll-smooth">
        <div class="text-gray-400 w-full text-center py-10 font-medium">데이터를 불러오는 중입니다...</div>
    </div>
</section>

        <section class="mb-20">
            <h2 class="text-2xl font-black text-gray-900 mb-6 flex items-center gap-2">
                📋 <span id="listTitleGenre" class="text-purple-600">전체</span> 공연 목록
            </h2>
            <div id="performanceList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6">
                <div class="text-gray-400 col-span-full text-center py-10 font-medium">데이터를 불러오는 중입니다...</div>
            </div>
        </section>
    </main>

    <script src="./js/app.js"></script>
</body>
</html>
