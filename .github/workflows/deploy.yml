name: Ticketing System CI/CD

on:
  push:
    branches: [ "test-main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Backend Image (Bohye's Work)
      run: |
        # 보혜님의 백엔드만 빌드해서 올립니다.
        docker build -t kingking4105/ticketing-was:latest ./ticketing-was
        docker push kingking4105/ticketing-was:latest

    - name: Deploy and Refresh K8s
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

        # 1. 최신 설정 파일 적용 (백엔드/프론트엔드)
        kubectl apply -f ./ticketing-was/ticket-backend.yaml
        kubectl apply -f ./web/ticket-frontend.yaml

        # 2. 💡 프론트엔드 최신 이미지 강제 반영 (성훈님 작업물 땡겨오기)
        # imagePullPolicy: Always 덕분에 재시작 시 최신 이미지를 새로 받아옵니다.
        kubectl rollout restart deployment/ticket-frontend-deploy
        
        # 3. 백엔드도 함께 재시작 (보혜님 작업물 반영)
        kubectl rollout restart deployment/ticket-backend-deploy

        # 완료 대기
        kubectl rollout status deployment/ticket-frontend-deploy
        kubectl rollout status deployment/ticket-backend-deploy
