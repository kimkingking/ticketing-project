name: Ticketing System CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted  # <--- 방금 만든 'master' 비서를 호출합니다!
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      run: |
        docker build -t kingking4105/ticketing-was:latest ./ticketing-was
        docker push kingking4105/ticketing-was:latest

    - name: Deploy to K8s
      run: |
        # 1. 비서의 컴퓨터에 쿠버네티스 접속 설정 만들기 (이건 꼭 필요해요!)
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

        # 2. 단순히 껐다 켜는 게 아니라, 수정된 '설계도(YAML)'를 직접 적용합니다!
        # 경로가 ./ticketing-was/ 안에 있는지 꼭 확인하세요! ㅋ
        find . -type f -name "*.yaml" -not -path "*/.*" -exec kubectl apply -f {} +

        # 3. (선택사항) 만약 이미지가 latest라면 확실히 재시작까지 해주면 더 좋아요.
        kubectl rollout restart deployment ticketing-was-deploiy
