name: Ticketing System CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted  # <--- 방금 만든 'master' 비서를 호출합니다!
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      run: |
        docker build -t kingking4105/ticketing-was:latest ./ticketing-was
        docker push kingking4105/ticketing-was:latest

    - name: Deploy to K8s
      run: |
        # 1. 설정 파일 복사
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

        # 2. [중요] 지금 비서가 어떤 파일들을 가지고 있는지 로그에 찍어보기
        echo "=== 현재 배포 가능한 파일 목록 ==="
        find . -name "*.yaml" -not -path "*/.*"
        
        # 3. 안전하게 하나씩 배포 (파일이 없어도 에러 안 나게 처리)
        # 만약 파일이 하나도 없으면 'No yaml files found'라고 찍고 그냥 넘어갑니다.
        FILES=$(find . -name "*.yaml" -not -path "*/.*")
        if [ -z "$FILES" ]; then
          echo "⚠️ 배포할 YAML 파일이 하나도 없어요! git add를 확인하세요."
        else
          echo "$FILES" | xargs kubectl apply -f
        fi

        # 4. 재시작
        kubectl rollout restart deployment ticketing-was-deploy || echo "Deployment not found, skipping restart"
