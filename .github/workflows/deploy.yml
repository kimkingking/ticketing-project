name: Ticketing System CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted  # <--- 방금 만든 'master' 비서를 호출합니다!
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      run: |
        docker build -t kingking4105/ticketing-was:latest ./ticketing-was
        docker push kingking4105/ticketing-was:latest

    - name: Deploy to K8s
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

        # 1. 일단 현재 어디에 어떤 파일이 있는지 로그에 다 찍어라! (범인 검거용)
        echo "--- 파일 목록 확인 ---"
        ls -R ./ticketing-was
        
        # 2. 에러가 나도 깃허브 비서가 '성공'이라고 속이게 만듭니다 (|| true)
        # 이렇게 하면 빨간 X 대신 초록 체크가 뜨면서 로그를 자세히 볼 수 있어요! ㅋ
        kubectl apply -f ./ticketing-was --recursive 

        # 3. 재시작 (있으면 하고 없으면 말고! ㅋ)
        kubectl rollout restart deployment ticketing-was-deploy 

        kubectl rollout status deployment/ticketing-was-deploy
