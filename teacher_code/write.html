<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <title>글쓰기</title>
</head>
<body>
    <div class="container">
        <nav class="nav-menu" id="nav-menu"></nav>
        <h2>새 글 작성</h2>
        <div class="input-form">
            <input type="text" id="write_title" placeholder="제목을 입력하세요">
            <input type="text" id="write_name" readonly style="background:#eee;">
            <!-- <input type="text" id="write_email" readonly style="background:#eee;"> -->
            <input type="password" id="write_pass" placeholder="글 수정용 비밀번호">
            <textarea id="write_content" placeholder="내용을 입력하세요"></textarea>
            <div class="btn-group">
                <button onclick="writePost()">등록</button>
                <button onclick="location.href='index.html'" class="btn-cancel">취소</button>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        window.onload = () => {
            updateMenu();
            if(!localStorage.getItem('userId')) {
                alert("로그인 후 이용 가능합니다.");
                location.href = 'login.html';
            } else {
                document.getElementById('write_name').value = localStorage.getItem('userName');
            }
        };
    </script>
</body>
</html>
