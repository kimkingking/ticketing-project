# [1] 내부 서비스용 (HTTP 통신)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: internal-http-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
    
    # 💡 [핵심 해결책] K8s 규칙 제약을 우회하여, Nginx 단에서 무조건 HTTPS로 튕겨냄
    nginx.ingress.kubernetes.io/server-snippet: |
      # 1. IP로 접속하든 도메인으로 접속하든 HTTP면 무조건 HTTPS로 강제 전환 (308)
      if ($scheme = "http") {
          return 308 https://$host$request_uri;
      }
      # 2. WAF 1차 방어 (XSS, SQLi)
      if ($request_uri ~* "(%3Cscript|<script|1=1|%27.*OR|%22.*OR|UNION.*SELECT|%2D%2D)") {
          return 403;
      }

    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "http://10.4.0.203, https://10.4.0.203, https://www.pulseticket.ke, https://pulseticket.ke"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, PUT, POST, DELETE, PATCH, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts: 
    - "pulseticket.ke"
    - "www.pulseticket.ke"
    # (🚨 IP 주소 제거됨 - K8s 에러 방지)
    secretName: pulseticket-tls-secret
  rules:
  - host: pulseticket.ke
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service: { name: ticket-backend-svc, port: { number: 8000 } }
      - path: /
        pathType: Prefix
        backend:
          service: { name: ticket-frontend-svc, port: { number: 80 } }
  - host: www.pulseticket.ke
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service: { name: ticket-backend-svc, port: { number: 8000 } }
      - path: /
        pathType: Prefix
        backend:
          service: { name: ticket-frontend-svc, port: { number: 80 } }
  # 💡 IP 접속을 받아주는 Catch-all 규칙 (host 필드 없음)
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service: { name: ticket-backend-svc, port: { number: 8000 } }
      - path: /
        pathType: Prefix
        backend:
          service: { name: ticket-frontend-svc, port: { number: 80 } }

---
# [2] 외부 KOPIS API 프록시용 (HTTPS 통신)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kopis-api-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-core-rules: "true"
    
    # 💡 프록시도 동일하게 HTTP -> HTTPS 강제 전환
    nginx.ingress.kubernetes.io/server-snippet: |
      if ($scheme = "http") {
          return 308 https://$host$request_uri;
      }
      if ($request_uri ~* "(%3Cscript|<script|1=1|%27.*OR|%22.*OR|UNION.*SELECT|%2D%2D)") {
          return 403;
      }
    
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/upstream-vhost: "www.kopis.or.kr"
    nginx.ingress.kubernetes.io/proxy-ssl-server-name: "on"
    nginx.ingress.kubernetes.io/proxy-ssl-name: "www.kopis.or.kr"
spec:
  ingressClassName: nginx
  tls:
  - hosts: 
    - "pulseticket.ke"
    - "www.pulseticket.ke"
    secretName: pulseticket-tls-secret
  rules:
  - host: pulseticket.ke
    http:
      paths:
      - path: /kopis-api
        pathType: Prefix
        backend:
          service: { name: kopis-proxy-svc, port: { number: 443 } }
  - host: www.pulseticket.ke
    http:
      paths:
      - path: /kopis-api
        pathType: Prefix
        backend:
          service: { name: kopis-proxy-svc, port: { number: 443 } }
  - http:
      paths:
      - path: /kopis-api
        pathType: Prefix
        backend:
          service: { name: kopis-proxy-svc, port: { number: 443 } }