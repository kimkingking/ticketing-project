apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: final-unified-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-ssl-server-name: "on"
    nginx.ingress.kubernetes.io/proxy-ssl-name: "www.kopis.or.kr"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - pulseticket.ke
    - www.pulseticket.ke
    secretName: pulseticket-tls-secret
  rules:
  - host: pulseticket.ke
    http:
      paths:
      - path: /kopis-api
        pathType: Prefix
        backend:
          service:
            name: kopis-proxy-svc
            port:
              number: 443
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ticket-frontend-svc
            port:
              number: 80
  - host: www.pulseticket.ke
    http:
      paths:
      - path: /kopis-api
        pathType: Prefix
        backend:
          service:
            name: kopis-proxy-svc
            port:
              number: 443
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ticket-frontend-svc
            port:
              number: 80
