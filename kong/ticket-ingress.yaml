# 1. KOPIS 외부 서비스 연결 (그대로 유지)
apiVersion: v1
kind: Service
metadata:
  name: kopis-proxy-svc
spec:
  type: ExternalName
  externalName: www.kopis.or.kr
---
# 2. 🌐 IP 접속 전용 인그레스 (10.4.0.203 전용)
# 어떠한 도메인 어노테이션도 섞이지 않게 하여 가장 순수하게 프론트엔드를 띄웁니다.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ip-access-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  ingressClassName: nginx
  rules:
  - http: # host를 명시하지 않음 (IP 접속 허용)
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ticket-frontend-svc
            port:
              number: 80
---
# 3. 🟢 웹 도메인 인그레스 (www.pulseticket.ke)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pulseticket-web-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts: ["pulseticket.ke", "www.pulseticket.ke"]
    secretName: pulseticket-tls-secret
  rules:
  - host: www.pulseticket.ke
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service: { name: ticket-frontend-svc, port: { number: 80 } }
  - host: pulseticket.ke
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service: { name: ticket-frontend-svc, port: { number: 80 } }
---
# 4. 🔴 KOPIS API 전용 인그레스
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pulseticket-api-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/proxy-ssl-server-name: "on"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - host: www.pulseticket.ke
    http:
      paths:
      - path: /kopis-api(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service: { name: kopis-proxy-svc, port: { number: 443 } }